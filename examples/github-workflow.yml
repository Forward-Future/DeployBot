name: DeployBot

on:
  pull_request_target:
    types: [labeled, ready_for_review, reopened, synchronize]
  pull_request_review:
    types: [submitted, dismissed]
  # Keep this list aligned with pipeline.ci_workflows in .mergequeue.toml.
  workflow_run:
    workflows: [CI]
    types: [completed]
  check_suite:
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read
  issues: write
  actions: read

concurrency:
  group: deploybot-${{ github.repository }}
  cancel-in-progress: false

jobs:
  react:
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.action != 'labeled' ||
      github.event.label.name == 'deploy-requested' ||
      github.event.label.name == 'merge-queue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      # Replace DEPLOYBOT_RELEASE_COMMIT with the reviewed v0.2.0 commit.
      - uses: Forward-Future/DeployBot@DEPLOYBOT_RELEASE_COMMIT
