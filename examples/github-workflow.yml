name: DeployBot

on:
  pull_request_target:
    types: [labeled, ready_for_review, reopened, synchronize]
  pull_request_review:
    types: [submitted, dismissed]
  # Keep this list aligned with pipeline.ci_workflows in .mergequeue.toml.
  workflow_run:
    workflows: [CI]
    types: [completed]
  check_suite:
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read
  issues: write
  actions: write # required for post-merge workflow_dispatch with github.token

concurrency:
  group: deploybot-${{ github.repository }}
  cancel-in-progress: false

jobs:
  react:
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.action != 'labeled' ||
      github.event.label.name == 'deploy-requested' ||
      github.event.label.name == 'merge-queue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      # v0.2.2 implementation; keep the full commit for privileged workflows.
      - uses: Forward-Future/DeployBot@2a502a74251e2fbb07e5b4769ce99687235df5ae
